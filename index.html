<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinclat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1915;
      --border: #2e2c28;
      --gold: #c9a84c;
      --gold-dim: #6b5826;
      --text: #e8e4da;
      --text-dim: #7a7570;
      --text-mid: #b0aa9f;
      --red: #c0392b;
      --green: #2ecc71;
      --tab-h: 48px;
      --radius: 4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 999;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--gold); }
    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── TAB BAR ── */
    .tab-bar-wrap {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar-wrap::-webkit-scrollbar { display: none; }
    .tab-bar {
      display: flex;
      min-width: max-content;
      padding: 0 24px;
      gap: 4px;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 18px;
      height: var(--tab-h);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text-mid); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-num { font-size: 0.6rem; color: var(--text-dim); }
    .tab.active .tab-num { color: var(--gold-dim); }
    .tab-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .tab.solved .tab-dot { background: var(--green); }
    .tab.failed .tab-dot { background: var(--red); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 60px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── HINTS ── */
    .hints-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-bottom: 36px;
    }

    /* ── HINT CARD FLIP ── */
    .hint-card {
      perspective: 800px;
      animation: fadeUp 0.4s ease both;
    }
    .hint-card:nth-child(1) { animation-delay: 0.05s; }
    .hint-card:nth-child(2) { animation-delay: 0.10s; }
    .hint-card:nth-child(3) { animation-delay: 0.15s; }
    .hint-card:nth-child(4) { animation-delay: 0.20s; }

    .hint-card-inner {
      position: relative;
      width: 100%;
      /* height is set dynamically so both faces match */
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .hint-card.flipped .hint-card-inner {
      transform: rotateY(180deg);
    }

    .hint-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      min-height: 110px; /* enough for two lines of hint text */
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .hint-face:hover { border-color: var(--gold-dim); }

    /* back face: rotated 180deg around Y */
    .hint-face-back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border-color: var(--gold-dim);
    }
    .hint-face-back:hover { border-color: var(--gold); }

    /* click affordance dot on front face */
    .hint-face-front::after {
      content: '▸';
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 0.55rem;
      color: var(--gold-dim);
      letter-spacing: 0.05em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .hint-face-front:hover::after { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hint-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }
    .hint-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1.45;
      color: var(--text);
    }
    .hint-number {
      position: absolute;
      top: 14px; right: 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--border);
      line-height: 1;
      pointer-events: none;
    }

    /* keyword displayed on back face */
    .keyword-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .keyword-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-align: center;
    }
    .keyword-hint-ref {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── ANSWER ── */
    .answer-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeUp 0.4s 0.25s ease both;
    }
    .answer-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      align-self: flex-start;
    }
    .blanks-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      width: 100%;
    }
    .word-group { display: flex; gap: 6px; }
    .letter-box {
      width: 38px; height: 48px;
      border: none;
      border-bottom: 2px solid var(--text-dim);
      background: transparent;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.3rem;
      text-align: center;
      text-transform: uppercase;
      transition: border-color 0.15s;
      outline: none;
      caret-color: var(--gold);
      padding: 0;
    }
    .letter-box:focus   { border-bottom-color: var(--gold); }
    .letter-box.correct { border-bottom-color: var(--green); color: var(--green); }
    .letter-box.wrong   { border-bottom-color: var(--red);   color: var(--red); }
    .letter-box:disabled { opacity: 0.6; cursor: default; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      padding: 10px 22px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--gold); color: #0f0e0c; border-color: var(--gold); }
    .btn-primary:hover { background: #e0bb6a; border-color: #e0bb6a; }
    .btn-ghost { background: transparent; color: var(--text-dim); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-mid); }
    .btn-primary:disabled, .btn-ghost:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── FEEDBACK ── */
    .feedback {
      min-height: 28px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-align: center;
      color: transparent;
      transition: color 0.2s;
    }
    .feedback.show-ok  { color: var(--green); }
    .feedback.show-err { color: var(--red); }

    /* ── REVEAL BANNER ── */
    .reveal-banner {
      display: none;
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-align: center;
      border: 1px solid;
    }
    .reveal-banner.solved {
      display: block;
      background: rgba(46,204,113,0.08);
      border-color: rgba(46,204,113,0.3);
      color: var(--green);
    }
    .reveal-banner.failed {
      display: block;
      background: rgba(192,57,43,0.08);
      border-color: rgba(192,57,43,0.3);
      color: var(--red);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      header { padding: 16px 20px 12px; }
      main   { padding: 28px 16px 48px; }
      .hints-grid { grid-template-columns: 1fr; }
      .hint-number { font-size: 1.3rem; }
      .letter-box  { width: 32px; height: 42px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Vincl<span>a</span>t</div>
    <div class="subtitle">Catalan LLM Evaluation Game</div>
  </div>
</header>

<div class="tab-bar-wrap">
  <div class="tab-bar" id="tabBar"></div>
</div>

<main id="main"></main>

<script>
  // ── PUZZLE DATA ────────────────────────────────────────────────────────────
  const PUZZLES = [
    {
      id: "95",
      hint_1: "A prisoner's room.",
      hint_2: "They cover your bed.",
      hint_3: "Bill Gates' operating system.",
      hint_4: "Furniture you sit around to eat or work.",
      keyword_1: "Cell",
      keyword_2: "Sheets",
      keyword_3: "Microsoft",
      keyword_4: "Table",
      solution: "Excel",
      solution_pattern: [5]
    },
    {
      id: "121",
      hint_1: "The pirates of the north.",
      hint_2: "The largest in the worls is Greenland.",
      hint_3: "Mountains that spit fire.",
      hint_4: "You layer up when you have it.",
      keyword_1: "Vikings",
      keyword_2: "Island",
      keyword_3: "Volcanoes",
      keyword_4: "Cold",
      solution: "Iceland",
      solution_pattern: [7]
    },
    {
      id: "31",
      hint_1: "Sex on the beach, Moscow Mule and Mojito.",
      hint_2: "Edema.",
      hint_3: "In Auschwitz they used to release gas.",
      hint_4: "In winter it can get very ____.",
      keyword_1: "Cocktail",
      keyword_2: "Swelling",
      keyword_3: "Shower",
      keyword_4: "Cold",
      solution: "ice",
      solution_pattern: [3]
    },
    {
      id: "43",
      hint_1: "You can give it at the hospital.",
      hint_2: "You don't get to choose it.",
      hint_3: "Liberty, Equality, __________",
      hint_4: "Emotional link between individuals, but can also be financial.",
      keyword_1: "Blood",
      keyword_2: "Family",
      keyword_3: "Fraternity",
      keyword_4: "Bond",
      solution: "brother",
      solution_pattern: [7]
    },
    {
      id: "94",
      hint_1: "Boundary between states.",
      hint_2: "Minors need it from their parents.",
      hint_3: "The opposite of exit.",
      hint_4: "International identification document.",
      keyword_1: "Border",
      keyword_2: "Permit",
      keyword_3: "Entry",
      keyword_4: "Passport",
      solution: "Visa",
      solution_pattern: [4]
    }
  ];

  // ── STATE ─────────────────────────────────────────────────────────────────
  const states = PUZZLES.map(() => ({ status: 'idle', letters: [] }));
  let current = 0;

  // ── ELEMENTS ──────────────────────────────────────────────────────────────
  const tabBar = document.getElementById('tabBar');
  const mainEl = document.getElementById('main');

  // ── BOOT ──────────────────────────────────────────────────────────────────
  buildTabs();
  renderPuzzle(0);

  // ── TABS ──────────────────────────────────────────────────────────────────
  function buildTabs() {
    tabBar.innerHTML = '';
    PUZZLES.forEach((_, i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.innerHTML = `
        <span class="tab-num">#${esc(PUZZLES[i].id)}</span>
        Puzzle ${i + 1}
        <span class="tab-dot"></span>
      `;
      tab.addEventListener('click', () => switchTab(i));
      tabBar.appendChild(tab);
    });
  }

  function syncTabStatus() {
    tabBar.querySelectorAll('.tab').forEach((tab, i) => {
      tab.classList.toggle('active', i === current);
      tab.classList.remove('solved', 'failed');
      const st = states[i].status;
      if (st === 'solved') tab.classList.add('solved');
      if (st === 'failed') tab.classList.add('failed');
    });
  }

  function switchTab(i) {
    if (i === current) return;
    current = i;
    syncTabStatus();
    renderPuzzle(i);
  }

  // ── RENDER PUZZLE ─────────────────────────────────────────────────────────
  function renderPuzzle(idx) {
    const p = PUZZLES[idx];
    const s = states[idx];
    const done = s.status !== 'idle';
    const solLetters = p.solution.replace(/\s+/g, '').toUpperCase().split('');

    mainEl.innerHTML = `
      <div class="hints-grid" id="hintsGrid"></div>
      <div class="answer-section">
        <div class="answer-label">Your Answer</div>
        <div class="blanks-wrap" id="blanksWrap"></div>
        <div class="feedback" id="feedback"></div>
        <div class="reveal-banner ${s.status !== 'idle' ? s.status : ''}" id="revealBanner">
          ${s.status === 'solved' ? '✓ Correct! Well done.'
            : s.status === 'failed' ? `✗ The answer was: ${p.solution.toUpperCase()}`
            : ''}
        </div>
        <div class="controls">
          <button class="btn-ghost"   id="clearBtn"  ${done ? 'disabled' : ''}>Clear</button>
          <button class="btn-ghost"   id="giveUpBtn" ${done ? 'disabled' : ''}>Give Up</button>
          <button class="btn-primary" id="checkBtn"  ${done ? 'disabled' : ''}>Check Answer</button>
        </div>
      </div>
    `;

    // ── BUILD HINT CARDS WITH FLIP ──────────────────────────────────────────
    const hintsGrid = document.getElementById('hintsGrid');
    [1, 2, 3, 4].forEach(n => {
      const keyword = p[`keyword_${n}`] || '—';
      const hintText = p[`hint_${n}`] || '';

      // outer wrapper (perspective container + animation target)
      const card = document.createElement('div');
      card.className = 'hint-card';

      // inner flipper
      const inner = document.createElement('div');
      inner.className = 'hint-card-inner';

      // FRONT FACE
      const front = document.createElement('div');
      front.className = 'hint-face hint-face-front';
      front.innerHTML = `
        <div class="hint-label">Clue ${n}</div>
        <div class="hint-text">${esc(hintText)}</div>
        <div class="hint-number">${n}</div>
      `;

      // BACK FACE
      const back = document.createElement('div');
      back.className = 'hint-face hint-face-back';
      back.innerHTML = `
        <div class="keyword-label">Clue ${n} — keyword</div>
        <div class="keyword-text">${esc(keyword)}</div>
        <div class="keyword-hint-ref">click to flip back</div>
      `;

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);
      hintsGrid.appendChild(card);

      // Sync inner/back height to front face after layout
      requestAnimationFrame(() => {
        const h = Math.max(front.getBoundingClientRect().height, 110);
        inner.style.height = h + 'px';
        back.style.height = h + 'px';
      });

      // Toggle flip on click
      card.addEventListener('click', () => {
        card.classList.toggle('flipped');
      });
    });

    // ── BUILD LETTER INPUTS ─────────────────────────────────────────────────
    const blanksWrap = document.getElementById('blanksWrap');
    const allBoxes = [];
    let boxIdx = 0;

    p.solution_pattern.forEach(len => {
      const group = document.createElement('div');
      group.className = 'word-group';
      for (let li = 0; li < len; li++) {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.maxLength = 1;
        inp.className = 'letter-box';
        inp.dataset.idx = boxIdx;
        inp.disabled = done;
        if (s.letters[boxIdx]) inp.value = s.letters[boxIdx];
        if (done && s.status === 'solved') inp.classList.add('correct');
        if (done && s.status === 'failed') {
          inp.value = solLetters[boxIdx] || '';
          inp.classList.add('wrong');
        }
        inp.addEventListener('keydown', e => handleKey(e, allBoxes, boxIdx));
        inp.addEventListener('input', e => {
          const v = e.target.value.replace(/[^a-zA-Z]/g, '');
          e.target.value = v.slice(-1).toUpperCase();
          saveLetters(idx, allBoxes);
          if (e.target.value) focusNext(allBoxes, parseInt(e.target.dataset.idx));
        });
        inp.addEventListener('focus', e => e.target.select());
        allBoxes.push(inp);
        group.appendChild(inp);
        boxIdx++;
      }
      blanksWrap.appendChild(group);
    });

    // ── BUTTON HANDLERS ─────────────────────────────────────────────────────
    document.getElementById('clearBtn').addEventListener('click', () => {
      allBoxes.forEach(b => { b.value = ''; b.classList.remove('correct', 'wrong'); });
      states[idx].letters = [];
      document.getElementById('feedback').className = 'feedback';
      allBoxes[0]?.focus();
    });

    document.getElementById('giveUpBtn').addEventListener('click', () => {
      states[idx].status = 'failed';
      allBoxes.forEach((b, i) => {
        b.value = solLetters[i] || '';
        b.classList.add('wrong');
        b.disabled = true;
      });
      finalize('failed', p);
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
      if (allBoxes.some(b => !b.value)) {
        showFeedback('Fill in all letters first.', 'err');
        return;
      }
      const guess  = allBoxes.map(b => b.value.toUpperCase()).join('');
      const answer = solLetters.join('');
      if (guess === answer) {
        allBoxes.forEach(b => { b.classList.remove('wrong'); b.classList.add('correct'); });
        states[idx].status = 'solved';
        finalize('solved', p);
      } else {
        showFeedback('Not quite — keep trying.', 'err');
      }
    });

    // Auto-focus first empty box
    if (!done) {
      const first = allBoxes.find(b => !b.value) || allBoxes[0];
      setTimeout(() => first?.focus(), 80);
    }
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function finalize(status, p) {
    ['clearBtn', 'giveUpBtn', 'checkBtn'].forEach(id => {
      document.getElementById(id).disabled = true;
    });
    document.getElementById('feedback').className = 'feedback';
    const banner = document.getElementById('revealBanner');
    banner.className = `reveal-banner ${status}`;
    banner.textContent = status === 'solved'
      ? '✓ Correct! Well done.'
      : `✗ The answer was: ${p.solution.toUpperCase()}`;
    syncTabStatus();
  }

  function saveLetters(idx, boxes) {
    states[idx].letters = boxes.map(b => b.value);
  }

  function showFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = `feedback show-${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'feedback'; }, 2400);
  }

  function focusNext(boxes, idx) {
    for (let i = idx + 1; i < boxes.length; i++) {
      if (!boxes[i].value) { boxes[i].focus(); return; }
    }
    if (idx + 1 < boxes.length) boxes[idx + 1].focus();
  }

  function handleKey(e, boxes, idx) {
    if (e.key === 'Backspace' && !boxes[idx].value && idx > 0) {
      boxes[idx - 1].value = '';
      boxes[idx - 1].classList.remove('correct', 'wrong');
      boxes[idx - 1].focus();
      e.preventDefault();
    }
    if (e.key === 'ArrowLeft'  && idx > 0)               { boxes[idx - 1].focus(); e.preventDefault(); }
    if (e.key === 'ArrowRight' && idx < boxes.length - 1) { boxes[idx + 1].focus(); e.preventDefault(); }
    if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
  }

  function esc(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
