<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Site Unavailable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #222;
    }
    .card {
      background: white;
      border-top: 4px solid #2c5f8a;
      border-radius: 6px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 1.4rem;
      color: #2c5f8a;
      margin-bottom: 1.2rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #444;
      margin-bottom: 1rem;
    }
    .note {
      font-size: 0.875rem;
      color: #888;
      border-top: 1px solid #eee;
      padding-top: 1rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>This Site Is No Longer Available</h1>
    <p>
      This website was created exclusively as a demonstration resource for
      <strong>MME Workshop</strong> at <strong>EACL 2026</strong> and was
      intended for use during the poster session only.
    </p>
    <p>
      Now that the workshop has concluded, the site has been taken offline and
      will not be maintained going forward.
    </p>
  </div>
</body>
</html>
